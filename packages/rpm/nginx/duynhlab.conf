# /etc/nginx/conf.d/duynhlab.conf — duynhlab platform reverse proxy.
# Generated/owned by the duynhlab RPM. Installed by init-service.sh only
# when the file does not already exist; admins may edit safely.
#
# On the RPM (single-host) deploy, nginx plays the gateway role that Kong
# plays in the cloud. URL shape mirrors the cloud edge 1:1 (Variant A):
#   /{service}/v1/{audience}/{resource...}
# Pass-through — nginx does NOT rewrite the path (== Kong strip-path:false);
# the backend mounts the full path on its own router. Only `public` and
# `private` are exposed here, exactly like the Kong ingress; `internal`
# audiences are service-to-service only and never reachable from the edge.
# Source of truth: duynhlab/homelab kubernetes/infra/configs/kong/ingress-api.yaml
# + docs/api/api-naming-convention.md.

upstream duynhlab_auth         { server 127.0.0.1:8001; }
upstream duynhlab_user         { server 127.0.0.1:8002; }
upstream duynhlab_product      { server 127.0.0.1:8003; }
upstream duynhlab_cart         { server 127.0.0.1:8004; }
upstream duynhlab_order        { server 127.0.0.1:8005; }
upstream duynhlab_review       { server 127.0.0.1:8006; }
upstream duynhlab_notification { server 127.0.0.1:8007; }
upstream duynhlab_shipping     { server 127.0.0.1:8008; }

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    access_log /var/log/duynhlab/nginx/access.log;
    error_log  /var/log/duynhlab/nginx/error.log;

    client_max_body_size 50m;
    proxy_http_version   1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- Frontend SPA -----------------------------------------------------
    root  /opt/duynhlab/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml application/rss+xml
               image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Long-cache hashed Vite assets
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- internal audience: never exposed at the edge (mirror Kong) -------
    # Checked before the per-service prefixes; service-to-service only.
    location ~ ^/[^/]+/v1/internal/ { return 404; }

    # --- Backend APIs — pass-through, public/private only (Variant A) -----
    # auth: public (login, register) + private (logout, me)
    location /auth/v1/public/          { proxy_pass http://duynhlab_auth; }
    location /auth/v1/private/         { proxy_pass http://duynhlab_auth; }
    # user: public (users/:id) + private (profile)
    location /user/v1/public/          { proxy_pass http://duynhlab_user; }
    location /user/v1/private/         { proxy_pass http://duynhlab_user; }
    # product: public catalog only
    location /product/v1/public/       { proxy_pass http://duynhlab_product; }
    # cart: private only
    location /cart/v1/private/         { proxy_pass http://duynhlab_cart; }
    # order: private only
    location /order/v1/private/        { proxy_pass http://duynhlab_order; }
    # review: public (list) + private (create)
    location /review/v1/public/        { proxy_pass http://duynhlab_review; }
    location /review/v1/private/       { proxy_pass http://duynhlab_review; }
    # notification: private only
    location /notification/v1/private/ { proxy_pass http://duynhlab_notification; }
    # shipping: public (track, estimate) only
    location /shipping/v1/public/      { proxy_pass http://duynhlab_shipping; }

    # --- Platform health (returns 200 if nginx is up) ---------------------
    location = /health {
        access_log off;
        return 200 "duynhlab-frontend-ok\n";
        default_type text/plain;
    }

    # --- SPA fallback (must be last) --------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
