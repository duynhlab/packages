# services.yaml — single source of truth for duynhlab/packages
# All build scripts, nfpm templates, and CI workflows render from this file.
# See plan.md § 1.5 (systemd schema) and § 1.8 (local-build).
#
# Schema:
#   name          short service identifier (used in RPM name as duynhlab-<name>)
#   repo          GitHub repo (owner/name)
#   src_dir       directory under $DUYNHLAB_SRC_ROOT (defaults to basename of repo)
#   binary        output binary name (defaults to name + "-service")
#   build_path    Go package main path (default ./cmd)
#   port          HTTP listen port. INJECTED as PORT= into <svc>.env. Every service
#                 defaults to 8080 in code, so on a shared host this override is
#                 MANDATORY to avoid collision (also used by duynhlab-ctl health).
#   grpc_port     gRPC listen port. INJECTED as GRPC_PORT= into <svc>.env. Only set
#                 for services that run a gRPC server (default 9090 in code →
#                 collides on a shared host). Omit for HTTP-only services.
#   type          backend | static
#   database      {name, app_user, migrator_user} — omit if no DB
#   dependencies  {after: [...], env_files: [...]} — extra systemd After= / EnvironmentFile=
#
# Migrations: each backend EMBEDS its own SQL (go:embed) and runs them via its own
# `<binary> migrate` subcommand (golang-migrate v4 through duynhlab/pkg/migratex,
# forward-only *.up.sql). The packages repo does NOT ship loose SQL or a separate
# migrate binary — see plan.md D23/D24. `duynhlab-db-setup <svc> migrate` just execs
# `<binary> migrate` with the migrator DB_USER/DB_PASSWORD in the environment.
#
# DB env vars read by every backend (no DATABASE_URL): DB_HOST, DB_PORT (5432),
# DB_NAME, DB_USER, DB_PASSWORD, DB_SSLMODE (disable), DB_POOL_MAX_CONNECTIONS (25),
# DB_POOL_MODE, DB_POOLER_TYPE. Migrations MUST hit the direct DB host, never a pooler.

services:
  - name: auth
    repo: duynhlab/auth-service
    src_dir: auth-service
    binary: auth-service
    build_path: ./cmd
    port: 8001
    grpc_port: 9001        # auth runs a gRPC server (9090 default in code)
    type: backend
    database:
      name: duynhlab_auth
      app_user: duynhlab_auth_app
      migrator_user: duynhlab_auth_migrator
    dependencies:
      after: []
      env_files: []

  - name: user
    repo: duynhlab/user-service
    src_dir: user-service
    binary: user-service
    build_path: ./cmd
    port: 8002
    type: backend
    database:
      name: duynhlab_user
      app_user: duynhlab_user_app
      migrator_user: duynhlab_user_migrator
    dependencies:
      after: []
      env_files: []

  - name: product
    repo: duynhlab/product-service
    src_dir: product-service
    binary: product-service
    build_path: ./cmd
    port: 8003
    type: backend
    database:
      name: duynhlab_product
      app_user: duynhlab_product_app
      migrator_user: duynhlab_product_migrator
    dependencies:
      after: []
      env_files: []

  - name: cart
    repo: duynhlab/cart-service
    src_dir: cart-service
    binary: cart-service
    build_path: ./cmd
    port: 8004
    type: backend
    database:
      name: duynhlab_cart
      app_user: duynhlab_cart_app
      migrator_user: duynhlab_cart_migrator
    dependencies:
      after: []
      env_files: []

  - name: order
    repo: duynhlab/order-service
    src_dir: order-service
    binary: order-service
    build_path: ./cmd
    port: 8005
    type: backend
    database:
      name: duynhlab_order
      app_user: duynhlab_order_app
      migrator_user: duynhlab_order_migrator
    dependencies:
      after: []
      env_files: []

  - name: review
    repo: duynhlab/review-service
    src_dir: review-service
    binary: review-service
    build_path: ./cmd
    port: 8006
    grpc_port: 9006        # review runs a gRPC server (9090 default in code)
    type: backend
    database:
      name: duynhlab_review
      app_user: duynhlab_review_app
      migrator_user: duynhlab_review_migrator
    dependencies:
      after: []
      env_files: []

  - name: notification
    repo: duynhlab/notification-service
    src_dir: notification-service
    binary: notification-service
    build_path: ./cmd
    port: 8007
    grpc_port: 9007        # notification runs a gRPC server (9090 default in code)
    type: backend
    database:
      name: duynhlab_notification
      app_user: duynhlab_notification_app
      migrator_user: duynhlab_notification_migrator
    dependencies:
      # notification-service is PostgreSQL-only — no cache/queue dependency (verified 2026-06-09,
      # grep of repo found none). It calls auth over gRPC (AUTH_GRPC_ADDR), ordered by
      # the platform target, so no extra After= is needed here.
      after: []
      env_files: []

  - name: shipping
    repo: duynhlab/shipping-service
    src_dir: shipping-service
    binary: shipping-service
    build_path: ./cmd
    port: 8008
    grpc_port: 9008        # shipping runs a gRPC server (9090 default in code)
    type: backend
    database:
      name: duynhlab_shipping
      app_user: duynhlab_shipping_app
      migrator_user: duynhlab_shipping_migrator
    dependencies:
      after: []
      env_files: []

  - name: frontend
    repo: duynhlab/frontend
    src_dir: frontend
    binary: ""
    build_path: ""
    port: 8080            # nginx vhost listen port on the host (frontend's own
                          # container listens on 80; we render our own vhost)
    type: static
    build:
      # Vite 8 + React 19 SPA, Node 24. API base URL is baked into the bundle at
      # BUILD time — it cannot be changed at runtime. Rebuild to repoint the gateway.
      cmd: "npm ci && npm run build"
      output_dir: dist
      web_root: /var/www/duynhlab-frontend
      env:
        VITE_API_BASE_URL: "https://gateway.duynh.me"   # build-time only
        VITE_USE_MOCK: "false"
    dependencies:
      after: [nginx.service]
      env_files: []
