name: smoke-test-rpm

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref for service repos"
        required: false
        default: main
  workflow_call:
    inputs:
      ref:
        description: "Git ref for service repos"
        required: false
        default: main
        type: string

permissions:
  contents: read

env:
  DUYNHLAB_SRC_ROOT: ${{ github.workspace }}/src
  CONTAINER_RUNNER: docker

jobs:
  full-systemd-smoke:
    name: Full systemd + Postgres smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout packages
        uses: actions/checkout@v6
        with:
          path: packages

      - name: Set up Go
        uses: actions/setup-go@v6
        with: { go-version: "stable", check-latest: true }

      - name: Set up Node
        uses: actions/setup-node@v6
        with: { node-version: "20" }

      - name: Install host tools (yq, podman)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq gettext-base curl tar podman uidmap
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          podman --version

      - name: Fetch service source
        working-directory: packages
        run: ./scripts/fetch-sources.sh "${{ inputs.ref || github.event.inputs.ref || 'main' }}"

      - name: Build services
        working-directory: packages
        run: |
          set -euo pipefail
          for svc in $(yq '.services[].name' services.yaml); do
            echo "::group::build-local $svc"
            ./scripts/build-local.sh "$svc"
            echo "::endgroup::"
          done

      - name: Render systemd units
        working-directory: packages
        run: ./scripts/render-systemd.sh

      - name: Stage Source0 tarball
        working-directory: packages
        run: ./scripts/stage-all.sh

      - name: Build mega-RPM
        working-directory: packages
        env:
          BUILD_RUNNER: docker
        run: ./scripts/build-rpm.sh

      - name: Quick smoke (file-level)
        working-directory: packages
        run: ./scripts/smoke-install.sh

      - name: Full smoke (systemd + Postgres)
        working-directory: packages
        run: sudo -E ./scripts/smoke-full.sh

      - name: Dump app journal on failure
        if: failure()
        run: |
          set +e
          podman ps -a
          podman logs duynhlab-smoke-app    | tail -300 || true
          podman logs duynhlab-smoke-db     | tail -100 || true
          podman exec duynhlab-smoke-app journalctl -xe --no-pager | tail -500 || true

      - name: Upload RPMs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: duynhlab-rpms-smoke
          path: packages/dist/*.rpm
          if-no-files-found: warn
          retention-days: 7
