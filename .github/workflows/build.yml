name: Build Packages (nFPM)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g., 1.2.3)'
        required: false
        type: string
      release:
        description: 'Package release number'
        required: false
        default: '1'
        type: string

jobs:
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: false

    - name: Install nFPM
      run: |
        echo "Installing nFPM v2.44.1..."
        go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.44.1
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        nfpm --version

    # Version determination with priority: Manual input > Git tag > Default
    - name: Determine version
      id: version
      if: github.event_name != 'pull_request'
      run: |
        # Priority 1: Manual input (workflow_dispatch)
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
          echo "Using manual input version: ${{ inputs.version }}"
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "release=${{ inputs.release || '1' }}" >> $GITHUB_OUTPUT
        
        # Priority 2: Git tag (tag push)
        elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Using tag version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release=1" >> $GITHUB_OUTPUT
        
        # Priority 3: Default
        else
          echo "Using default version: 1.0.0"
          echo "version=1.0.0" >> $GITHUB_OUTPUT
          echo "release=1" >> $GITHUB_OUTPUT
        fi

    # Update nfpm.yaml with determined version
    - name: Update nfpm.yaml with version
      if: github.event_name != 'pull_request'
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        RELEASE="${{ steps.version.outputs.release }}"
        
        # Update version in nfpm.yaml
        sed -i "s/^version:.*/version: \"$VERSION\"/" nfpm.yaml
        sed -i "s/^release:.*/release: \"$RELEASE\"/" nfpm.yaml
        
        # Verify changes
        echo "Updated nfpm.yaml:"
        grep "^version:" nfpm.yaml
        grep "^release:" nfpm.yaml

    - name: Build packages with nFPM
      if: github.event_name != 'pull_request'
      run: |
        echo "Building packages with nFPM..."
        chmod +x scripts/build-nfpm.sh
        PACKAGE_FORMATS="rpm deb" ./scripts/build-nfpm.sh
        echo ""
        echo "Generated packages:"
        ls -lh dist/*.{rpm,deb} 2>/dev/null || true

    - name: Test DEB package installation
      if: github.event_name != 'pull_request'
      run: |
        echo "Testing DEB package installation..."
        
        # Find DEB package
        DEB_FILE=$(ls dist/*.deb 2>/dev/null | head -n1)
        if [ -z "$DEB_FILE" ]; then
          echo "[ERROR] No DEB package found in dist/"
          exit 1
        fi
        
        echo "[INFO] Found DEB package: $DEB_FILE"
        echo "[INFO] Package size: $(du -h "$DEB_FILE" | cut -f1)"
        
        # Install dependencies (nginx, redis-server, systemd)
        echo "[INFO] Installing dependencies..."
        sudo apt-get update -qq
        sudo apt-get install -y nginx redis-server systemd || true
        
        # Stop services that may conflict with port checks
        echo "[INFO] Stopping conflicting services for installation test..."
        sudo systemctl stop redis-server 2>/dev/null || true
        sudo systemctl stop nginx 2>/dev/null || true
        
        # Install DEB package
        echo "[INFO] Installing DEB package..."
        sudo dpkg -i "$DEB_FILE" || {
          echo "[WARNING] dpkg install had issues, checking dependencies..."
          sudo apt-get install -f -y
        }
        
        # Verify installation
        echo "[INFO] Verifying installation..."
        
        # Check if binaries are installed
        echo "[INFO] Checking installed binaries..."
        for service in api-server user-api checkout-api voter-api; do
          if [ -f "/opt/platform/apps/$service/$service" ]; then
            echo "  [OK] Binary installed: /opt/platform/apps/$service/$service"
            ls -lh "/opt/platform/apps/$service/$service"
          else
            echo "  [ERROR] Binary not found: /opt/platform/apps/$service/$service"
            exit 1
          fi
        done
        
        # Check if configs are installed
        echo "[INFO] Checking installed configs..."
        if [ -f "/opt/platform/apps/api-server/api-server.properties" ]; then
          echo "  [OK] Config installed: /opt/platform/apps/api-server/api-server.properties"
        else
          echo "  [ERROR] Config not found: /opt/platform/apps/api-server/api-server.properties"
          exit 1
        fi
        
        # Check if systemd units are installed
        echo "[INFO] Checking systemd units..."
        for unit in platform-api-server.service platform-user-api.service platform-checkout-api.service platform-voter-api.service platform-all.target; do
          if [ -f "/lib/systemd/system/$unit" ]; then
            echo "  [OK] Systemd unit installed: /lib/systemd/system/$unit"
          else
            echo "  [ERROR] Systemd unit not found: /lib/systemd/system/$unit"
            exit 1
          fi
        done
        
        # Check if infrastructure configs are installed
        echo "[INFO] Checking infrastructure configs..."
        if [ -f "/etc/nginx/conf.d/platform.conf" ]; then
          echo "  [OK] Nginx config installed: /etc/nginx/conf.d/platform.conf"
        else
          echo "  [WARNING] Nginx config not found: /etc/nginx/conf.d/platform.conf"
        fi
        
        if [ -f "/etc/redis/platform-redis.conf" ]; then
          echo "  [OK] Redis config installed: /etc/redis/platform-redis.conf"
        else
          echo "  [WARNING] Redis config not found: /etc/redis/platform-redis.conf"
        fi
        
        # Check systemd daemon-reload was done
        echo "[INFO] Verifying systemd units are loaded..."
        if systemctl list-unit-files | grep -q "platform-all.target"; then
          echo "  [OK] Systemd units are loaded"
        else
          echo "  [WARNING] Systemd units may not be loaded"
        fi
        
        # List all installed files (summary)
        echo "[INFO] Summary of installed files:"
        echo "  Binaries:"
        find /opt/platform/apps -type f -name "*api" -exec ls -lh {} \;
        echo "  Configs:"
        find /opt/platform/apps -type f -name "*.properties" | head -5
        echo "  Systemd units:"
        ls -lh /lib/systemd/system/platform-* 2>/dev/null | head -5
        
        echo ""
        echo "[SUCCESS] DEB package installation test passed!"

    - name: Upload artifacts
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: packages
        path: |
          dist/*.rpm
          dist/*.deb
        retention-days: 30
