name: build-rpms

# VALIDATION only — never publishes. Releases are cut by pushing a CalVer tag
# (`make release`) → .github/workflows/release.yml. The actual pipeline lives
# in the reusable _build-test.yml (shared with release.yml).

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to check out for source-built services (branch/tag/sha)"
        required: false
        default: main
      source:
        description: "Backend binaries: 'local' (compile) or 'release' (download per services.lock)"
        required: false
        default: local
        type: choice
        options: [local, release]

permissions:
  contents: read

jobs:
  build-test:
    name: build-test
    uses: ./.github/workflows/_build-test.yml
    with:
      artifact-name: duynhlab-rpms
      services-ref: ${{ github.event.inputs.ref || 'main' }}
      source: ${{ github.event.inputs.source || 'local' }}
