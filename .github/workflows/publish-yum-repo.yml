name: publish-yum-repo

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to check out for every service repo (branch/tag/sha)"
        required: false
        default: main
  workflow_run:
    workflows: ["build-rpms"]
    types: [completed]
    branches: [main]

concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  DUYNHLAB_SRC_ROOT: ${{ github.workspace }}/src
  BASE_URL: https://duynhlab.github.io/packages
  CREATEREPO_RUNNER: docker

jobs:
  build-and-publish:
    name: Build RPMs + publish to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          path: packages

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install host tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gettext-base curl tar
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Fetch service source
        working-directory: packages
        run: ./scripts/fetch-sources.sh "${{ github.event.inputs.ref || 'main' }}"

      - name: Build all services
        working-directory: packages
        run: |
          set -euo pipefail
          for svc in $(yq '.services[].name' services.yaml); do
            echo "::group::build-local $svc"
            ./scripts/build-local.sh "$svc"
            echo "::endgroup::"
          done

      - name: Render systemd units
        working-directory: packages
        run: ./scripts/render-systemd.sh

      - name: Stage Source0 tarball
        working-directory: packages
        run: ./scripts/stage-all.sh

      - name: Compute version
        id: ver
        run: echo "version=$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Build mega-RPM
        working-directory: packages
        env:
          BUILD_RUNNER: docker
          VERSION: ${{ steps.ver.outputs.version }}
        run: ./scripts/build-rpm.sh

      - name: Create GitHub Release + upload RPM
        working-directory: packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          rpm=$(ls dist/duynhlab-*.x86_64.rpm | head -1)
          echo "Release tag: $tag  asset: $rpm"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$tag" "$rpm" --repo "${{ github.repository }}" --clobber
          else
            gh release create "$tag" "$rpm" \
              --repo "${{ github.repository }}" \
              --title "packages ${VERSION}" \
              --notes "Mega-RPM for the duynhlab platform (EL9). Install via the YUM repo: https://duynhlab.github.io/packages"
          fi

      - name: Stage YUM repo into gh-pages tree
        working-directory: packages
        env:
          REPO_OUT: ${{ github.workspace }}/gh-pages
          BASE_URL: ${{ env.BASE_URL }}
          RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.ver.outputs.version }}/
        run: ./scripts/publish-yum-repo.sh

      - name: Commit + push gh-pages (orphan, metadata only)
        working-directory: gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "duynebot"
          git config user.email "duynebot@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          # gh-pages now holds only repodata + landing files (KB-sized), so keep a
          # single-commit orphan branch — no history bloat, no large-file pushes.
          git checkout --orphan publish
          git add -A
          git commit -m "publish: $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git branch -M publish gh-pages
          git push -f origin gh-pages

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: gh-pages
          include-hidden-files: true

      - name: Print final URLs
        run: |
          echo "Repo:       $BASE_URL"
          echo ".repo file: $BASE_URL/duynhlab.repo"
          echo "Metadata:   $BASE_URL/rpm/el9/x86_64/repodata/"
          echo "RPMs:       https://github.com/${{ github.repository }}/releases/tag/v${{ steps.ver.outputs.version }}"

  deploy:
    name: Deploy gh-pages tree to GitHub Pages
    needs: build-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

