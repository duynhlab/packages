# /etc/nginx/conf.d/duynhlab.conf — duynhlab platform reverse proxy.
# Generated/owned by the duynhlab RPM. Installed by init-service.sh only
# when the file does not already exist; admins may edit safely.

upstream duynhlab_auth         { server 127.0.0.1:8001; }
upstream duynhlab_user         { server 127.0.0.1:8002; }
upstream duynhlab_product      { server 127.0.0.1:8003; }
upstream duynhlab_cart         { server 127.0.0.1:8004; }
upstream duynhlab_order        { server 127.0.0.1:8005; }
upstream duynhlab_review       { server 127.0.0.1:8006; }
upstream duynhlab_notification { server 127.0.0.1:8007; }
upstream duynhlab_shipping     { server 127.0.0.1:8008; }

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    access_log /var/log/duynhlab/nginx/access.log;
    error_log  /var/log/duynhlab/nginx/error.log;

    client_max_body_size 50m;
    proxy_http_version   1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- Frontend SPA -----------------------------------------------------
    root  /opt/duynhlab/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml application/rss+xml
               image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Long-cache hashed Vite assets
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Backend APIs (one location per service) --------------------------
    location /api/auth/         { proxy_pass http://duynhlab_auth/; }
    location /api/user/         { proxy_pass http://duynhlab_user/; }
    location /api/product/      { proxy_pass http://duynhlab_product/; }
    location /api/cart/         { proxy_pass http://duynhlab_cart/; }
    location /api/order/        { proxy_pass http://duynhlab_order/; }
    location /api/review/       { proxy_pass http://duynhlab_review/; }
    location /api/notification/ { proxy_pass http://duynhlab_notification/; }
    location /api/shipping/     { proxy_pass http://duynhlab_shipping/; }

    # --- Platform health (returns 200 if nginx is up) ---------------------
    location = /health {
        access_log off;
        return 200 "duynhlab-frontend-ok\n";
        default_type text/plain;
    }

    # --- SPA fallback (must be last) --------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
