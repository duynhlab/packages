# duynhlab — PostgreSQL tuning snippet.
# Dropped into /etc/postgresql/conf.d/duynhlab-tuning.conf (or
# /var/lib/pgsql/<v>/data/conf.d/) by /opt/duynhlab/lib/init-service.sh on first
# install. Never overwritten.
#
# Requires a parent postgresql.conf with:
#   include_dir = 'conf.d'
# Rocky/Alma 9 default postgresql-server doesn't enable conf.d by default —
# admins must add the include_dir line once after `postgresql-setup --initdb`.
# Reload after change: `systemctl reload postgresql`.

# ── Connections ───────────────────────────────────────────────────────────────
max_connections = 300

# ── Memory ────────────────────────────────────────────────────────────────────
# Sized for a small/medium box (4–8 GB RAM). Re-tune for your hardware.
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 8MB
maintenance_work_mem = 128MB

# ── WAL / checkpoint ──────────────────────────────────────────────────────────
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 256MB

# ── Planner ───────────────────────────────────────────────────────────────────
random_page_cost = 1.1
default_statistics_target = 100

# ── Logging ───────────────────────────────────────────────────────────────────
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%m [%p] %q%u@%d '
