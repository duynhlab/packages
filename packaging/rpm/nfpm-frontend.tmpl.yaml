# nFPM template for duynhlab-frontend (static SPA + nginx vhost).
# Placeholders (envsubst): ${VERSION} ${RELEASE} ${STAGING_DIR}
name: duynhlab-frontend
arch: noarch
platform: linux
version: ${VERSION}
version_schema: none
release: ${RELEASE}
section: default
priority: optional
maintainer: "duynhlab <ops@duynhlab.io>"
description: |
  duynhlab frontend (React SPA built with Vite).
  Ships static assets at /opt/duynhlab/frontend/dist and an nginx vhost
  at /etc/nginx/conf.d/duynhlab-frontend.conf.
vendor: duynhlab
homepage: https://duynhlab.github.io/packages
license: Proprietary

depends:
  - duynhlab-common >= 0.0.0
  - nginx >= 1.20

rpm:
  group: Applications/Internet
  compression: zstd

contents:
  - src: ${STAGING_DIR}/opt/duynhlab/frontend/dist/
    dst: /opt/duynhlab/frontend/dist/
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ${STAGING_DIR}/opt/duynhlab/frontend/BINARY_VERSION
    dst: /opt/duynhlab/frontend/BINARY_VERSION
    file_info:
      mode: 0644

  - src: ${STAGING_DIR}/etc/nginx/conf.d/duynhlab-frontend.conf
    dst: /etc/nginx/conf.d/duynhlab-frontend.conf
    type: config|noreplace
    file_info:
      mode: 0644

scripts:
  postinstall: ${STAGING_DIR}/scripts/frontend-postinstall.sh
  postremove: ${STAGING_DIR}/scripts/frontend-postremove.sh
