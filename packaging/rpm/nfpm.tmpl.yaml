# nFPM template for per-service RPM. Render via scripts/render-nfpm.sh.
# Placeholders (envsubst): ${SERVICE_NAME} ${BINARY_NAME} ${VERSION} ${RELEASE}
#                          ${STAGING_DIR} ${SYSTEMD_DIR}
name: duynhlab-${SERVICE_NAME}
arch: amd64
platform: linux
version: ${VERSION}
version_schema: none
release: ${RELEASE}
section: default
priority: optional
maintainer: "duynhlab <ops@duynhlab.io>"
description: |
  duynhlab ${SERVICE_NAME} service.
  Part of the duynhlab e-commerce platform.
vendor: duynhlab
homepage: https://duynhlab.github.io/packages
license: Proprietary

depends:
  - duynhlab-common >= 0.0.0
  - postgresql >= 14

rpm:
  group: Applications/Internet
  compression: zstd
  signature: {}

contents:
  - src: ${STAGING_DIR}/opt/duynhlab/${SERVICE_NAME}/bin/${BINARY_NAME}
    dst: /opt/duynhlab/${SERVICE_NAME}/bin/${BINARY_NAME}
    file_info:
      mode: 0755
      owner: duynhlab
      group: duynhlab

  - src: ${STAGING_DIR}/opt/duynhlab/${SERVICE_NAME}/BINARY_VERSION
    dst: /opt/duynhlab/${SERVICE_NAME}/BINARY_VERSION
    file_info:
      mode: 0644

  - src: ${STAGING_DIR}/opt/duynhlab/${SERVICE_NAME}/SCHEMA_VERSION
    dst: /opt/duynhlab/${SERVICE_NAME}/SCHEMA_VERSION
    file_info:
      mode: 0644

  - src: ${STAGING_DIR}/opt/duynhlab/${SERVICE_NAME}/migrations/sql/
    dst: /opt/duynhlab/${SERVICE_NAME}/migrations/sql/
    file_info:
      mode: 0644

  - src: ${SYSTEMD_DIR}/duynhlab-${SERVICE_NAME}.service
    dst: /usr/lib/systemd/system/duynhlab-${SERVICE_NAME}.service
    file_info:
      mode: 0644

  - src: ${STAGING_DIR}/etc/duynhlab/${SERVICE_NAME}/${SERVICE_NAME}.env.template
    dst: /etc/duynhlab/${SERVICE_NAME}/${SERVICE_NAME}.env.template
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: duynhlab

scripts:
  preinstall: ${STAGING_DIR}/scripts/preinstall.sh
  postinstall: ${STAGING_DIR}/scripts/postinstall.sh
  preremove: ${STAGING_DIR}/scripts/preremove.sh
  postremove: ${STAGING_DIR}/scripts/postremove.sh
