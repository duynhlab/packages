# duynhlab — valkey/redis tuning snippet.
# Dropped into /etc/valkey/conf.d/duynhlab.conf (or /etc/redis/conf.d/) by
# /opt/duynhlab/lib/init-service.sh on first install. Never overwritten.
#
# Loaded via `include /etc/valkey/conf.d/*.conf` in the distro default
# /etc/valkey/valkey.conf (Rocky/Alma 9 default has this include).

# ── Memory ────────────────────────────────────────────────────────────────────
maxmemory 1gb
maxmemory-policy allkeys-lru

# ── Persistence (cache mode — RDB+AOF off) ────────────────────────────────────
save ""
appendonly no

# ── Networking ────────────────────────────────────────────────────────────────
bind 127.0.0.1 -::1
protected-mode yes
tcp-keepalive 60
timeout 0

# ── Connection limits ─────────────────────────────────────────────────────────
maxclients 2000

# ── Slowlog ───────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 256
