name: duynhlab-common
arch: amd64
platform: linux
version: ${VERSION}
version_schema: none
release: ${RELEASE}
section: default
priority: optional
maintainer: "duynhlab <ops@duynhlab.io>"
description: |
  duynhlab platform common tooling.
  Ships duynhlab-ctl, duynhlab-db-setup, duynhlab-db-migrate (golang-migrate),
  duynhlab-gen-password, the duynhlab-platform.target unit, and the canonical
  services.yaml manifest. Required by every duynhlab-<svc> package.
vendor: duynhlab
homepage: https://duynhlab.github.io/packages
license: Proprietary

depends:
  - bash
  - coreutils
  - postgresql >= 14
  - yq

rpm:
  group: Applications/System
  compression: zstd

contents:
  - src: ${STAGING_DIR}/usr/bin/duynhlab-db-migrate
    dst: /usr/bin/duynhlab-db-migrate
    file_info:
      mode: 0755

  - src: ${COMMON_SRC}/duynhlab-db-setup
    dst: /usr/bin/duynhlab-db-setup
    file_info:
      mode: 0755

  - src: ${COMMON_SRC}/duynhlab-ctl
    dst: /usr/bin/duynhlab-ctl
    file_info:
      mode: 0755

  - src: ${COMMON_SRC}/duynhlab-gen-password
    dst: /usr/bin/duynhlab-gen-password
    file_info:
      mode: 0755

  - src: ${COMMON_SRC}/duynhlab-ctl.bash-completion
    dst: /etc/bash_completion.d/duynhlab-ctl
    file_info:
      mode: 0644

  - src: ${SERVICES_YAML}
    dst: /etc/duynhlab/common/services.yaml
    file_info:
      mode: 0644

  - src: ${SYSTEMD_DIR}/duynhlab-platform.target
    dst: /usr/lib/systemd/system/duynhlab-platform.target
    file_info:
      mode: 0644

  - dst: /etc/duynhlab/common
    type: dir
    file_info:
      mode: 0755

scripts:
  preinstall: ${STAGING_DIR}/scripts/common-preinstall.sh
  postinstall: ${STAGING_DIR}/scripts/common-postinstall.sh
  postremove: ${STAGING_DIR}/scripts/common-postremove.sh
